name: gestionale_upload_images_s3

on:
  push:
    branches:
      - main

jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.14"

      # Step 3: Install Virtualenv
      - name: Install Virtualenv
        run: pip install virtualenv

      # Step 5: Create Virtual Environment if Cache Misses
      - name: Set up Virtual Environment
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      # Step 6: Run Tests
      # - name: Run Tests
      #   run: |
      #     source venv/bin/activate
      #     pytest

      # Step 7: Create archive of dependencies. # IMPORTANT!!!: change api n for erach pipeline to avoid cache issues with AWS Lambda layers
      - name: Create archive of dependencies
        run: |
          cd ./venv/lib/python3.14/site-packages
          zip -r9 ../../../../api4.zip .

      # Step 8: Add API files to Zip file
      - name: Add API files to Zip file
        run: |
          cd ./api
          zip -g ../api4.zip -r .

      # Step 9: Upload API Zip Artifact
      - name: Upload API Zip
        uses: actions/upload-artifact@v4
        with:
          name: api4
          path: api4.zip

  CD:
    runs-on: ubuntu-latest
    needs: [CI]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Download Lambda api4.zip
        uses: actions/download-artifact@v4
        with:
          name: api4
          path: .

      - name: Upload to S3
        run: aws s3 cp api4.zip s3://${{ secrets.AWS_S3_BUCKET }}/api4.zip  

      - name: Deploy new Lambda
        run: aws lambda update-function-code --function-name ${{ secrets.AWS_LAMBDA }} --s3-bucket ${{ secrets.AWS_S3_BUCKET }} --s3-key api4.zip
